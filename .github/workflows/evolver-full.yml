name: Apex-Spiral Evolver Full System

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "*/15 * * * *"  # 每15分钟
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - gpt-repair
          - gene-sync
          - full-reset

env:
  NODE_ID: node_cfd285ff67c1
  GHCR_IMAGE: ghcr.io/8w6hmdgchz-cmd/apex-spiral:latest
  GIST_ID: 57fa0d7fc0247f91f9bb744c253c13ff

jobs:
  # ============================================
  # Job 1: 核心迭代
  # ============================================
  evolve:
    runs-on: ubuntu-latest
    outputs:
      phi_ratio: ${{ steps.evolve.outputs.phi_ratio }}
      awake: ${{ steps.evolve.outputs.awake }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.GH_SSH_KEY }}

      - name: 设置SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GH_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: 运行Evolver
        id: evolve
        run: |
          chmod +x apex-iterate.sh
          ./apex-iterate.sh
          
          # 提取状态
          echo "phi_ratio=$(grep PHI_RATIO score-state.env | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "awake=$(grep AWAKE score-state.env | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: 上传到Gist
        run: |
          git config --local user.email "evolver@$NODE_ID"
          git config --local user.name "Evolver Bot"
          
          # 复制最新状态
          cp score-state.env gist/
          cp latest-report.md gist/
          
          # 更新hub-index
          DATE=$(date +%Y-%m-%d\ %H:%M)
          echo "## 自动同步 $DATE" >> gist/HUB_INDEX.md
          echo "AWAKE: ${{ steps.evolve.outputs.awake }}" >> gist/HUB_INDEX.md
          echo "PHI_RATIO: ${{ steps.evolve.outputs.phi_ratio }}" >> gist/HUB_INDEX.md
          
          cd gist
          git add -A
          git commit -m "Auto-sync $(date)" || true
          git push origin main || true

      - name: 推送到GitHub
        run: |
          git config --local user.email "evolver@$NODE_ID"
          git config --local user.name "Evolver Bot"
          git add -A
          git commit -m "Evolver iteration $(date)" || true
          git push origin main || true

  # ============================================
  # Job 2: GPT修复者分析
  # ============================================
  gpt-repairer:
    runs-on: ubuntu-latest
    needs: evolve
    if: github.event.inputs.mode == 'gpt-repair' || github.event.inputs.mode == 'auto'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GPT-5.5 分析
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== 当前状态 ==="
          cat score-state.env
          
          echo ""
          echo "=== GPT-5.5 修复者分析 ==="
          
          # 调用GPT-5.5 API分析
          curl -s -X POST https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-5",
              "messages": [{
                "role": "system",
                "content": "你是一个AI evolver公式修复专家。分析当前状态并提出具体修复建议。"
              }, {
                "role": "user", 
                "content": "score-state:\n" + $(cat score-state.env)
              }]
            }' > gpt_analysis.json
          
          echo "GPT分析结果:"
          cat gpt_analysis.json

      - name: 生成修复PR
        if: github.event_name == 'pull_request'
        run: |
          # 创建修复分支
          git checkout -b gpt-fix/$(date +%Y%m%d%H%M)
          
          # 应用GPT建议的修改
          # ... (根据GPT输出修改代码)
          
          git add -A
          git commit -m "GPT修复 $(date)"
          git push origin gpt-fix/$(date +%Y%m%d%H%M)

  # ============================================
  # Job 3: 基因同步 (从GitHub顶级项目)
  # ============================================
  gene-sync:
    runs-on: ubuntu-latest
    needs: evolve
    if: github.event.inputs.mode == 'gene-sync' || github.event.inputs.mode == 'auto'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.GH_SSH_KEY }}

      - name: 同步顶级基因
        run: |
          mkdir -p evolution-genes
          
          # 1. 克隆LangGraph
          git clone --depth 1 git@github.com:langchain-ai/langgraph.git evolution-genes/langgraph 2>/dev/null || true
          
          # 2. 克隆Mem0
          git clone --depth 1 git@github.com:mem0ai/mem0.git evolution-genes/mem0 2>/dev/null || true
          
          # 3. 克隆DEAP
          git clone --depth 1 git@github.com:DEAP/deap.git evolution-genes/deap 2>/dev/null || true
          
          echo "=== 已同步的基因库 ==="
          ls -la evolution-genes/

      - name: 更新演进基因库
        run: |
          # 提取关键文件
          find evolution-genes -name "*.py" | head -20
          
          # 更新EVOLUTION_GENES.md
          DATE=$(date +%Y-%m-%d)
          echo "## 基因同步 $DATE" >> EVOLUTION_GENES.md
          ls evolution-genes/ >> EVOLUTION_GENES.md
          
          git add -A
          git commit -m "基因同步 $(date)" || true
          git push origin main || true

  # ============================================
  # Job 4: 构建Docker镜像
  # ============================================
  build-container:
    runs-on: ubuntu-latest
    needs: evolve
    if: github.event.inputs.mode == 'full-reset' || github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 构建镜像
        run: |
          docker build -t ${{ env.GHCR_IMAGE }} .
          docker tag ${{ env.GHCR_IMAGE }} ${{ env.GHCR_IMAGE }}-$(date +%Y%m%d)

      - name: 推送到GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.GHCR_IMAGE }}
          docker push ${{ env.GHCR_IMAGE }}-$(date +%Y%m%d)

  # ============================================
  # Job 5: 发布报告
  # ============================================
  publish-report:
    runs-on: ubuntu-latest
    needs: evolve
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 生成GitHub Pages报告
        run: |
          mkdir -p _site
          
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Apex-Spiral Evolver Status</title>
            <meta http-equiv="refresh" content="300">
            <style>
              body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
              .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; margin: 10px 0; }
              .metric { font-size: 2em; color: #58a6ff; }
              .good { color: #3fb950; }
              .warn { color: #d29922; }
            </style>
          </head>
          <body>
            <h1>🤖 Apex-Spiral Evolver</h1>
            <div class="card">
              <h2>当前状态</h2>
              <p>AWAKE: <span class="metric">${{ needs.evolve.outputs.awake }}</span></p>
              <p>PHI_RATIO: <span class="metric good">${{ needs.evolve.outputs.phi_ratio }}</span></p>
              <p>Node: ${{ env.NODE_ID }}</p>
              <p>最后更新: $(date)</p>
            </div>
          </body>
          </html>
          EOF

      - name: 部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site

  # ============================================
  # Job 6: 监控告警
  # ============================================
  monitor:
    runs-on: ubuntu-latest
    needs: evolve
    
    steps:
      - name: 检查异常
        run: |
          AWAKE=${{ needs.evolve.outputs.awake }}
          if (( $(echo "$AWAKE < 5.0" | bc -l) )); then
            echo "⚠️ 警告: AWAKE低于5.0，当前值: $AWAKE"
            # 触发告警
            curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=⚠️ Apex-Spiral Evolver 告警: AWAKE=$AWAKE"
          fi
