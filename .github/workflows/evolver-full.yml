name: Apex-Spiral Evolver Full System

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "*/15 * * * *"  # жҜҸ15еҲҶй’ҹ
  workflow_dispatch:
    inputs:
      mode:
        description: 'иҝҗиЎҢжЁЎејҸ'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - gpt-repair
          - gene-sync
          - full-reset

env:
  NODE_ID: node_cfd285ff67c1
  GHCR_IMAGE: ghcr.io/8w6hmdgchz-cmd/apex-spiral:latest
  GIST_ID: 57fa0d7fc0247f91f9bb744c253c13ff

jobs:
  # ============================================
  # Job 1: ж ёеҝғиҝӯд»Ј
  # ============================================
  evolve:
    runs-on: ubuntu-latest
    outputs:
      phi_ratio: ${{ steps.evolve.outputs.phi_ratio }}
      awake: ${{ steps.evolve.outputs.awake }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.GH_SSH_KEY }}

      - name: и®ҫзҪ®SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GH_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: иҝҗиЎҢEvolver
        id: evolve
        run: |
          chmod +x apex-iterate.sh
          ./apex-iterate.sh
          
          # жҸҗеҸ–зҠ¶жҖҒ
          echo "phi_ratio=$(grep PHI_RATIO score-state.env | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "awake=$(grep AWAKE score-state.env | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: жҺЁйҖҒеҲ°GitHub
        run: |
          git config --local user.email "evolver@$NODE_ID"
          git config --local user.name "Evolver Bot"
          
          # еӨҚеҲ¶жңҖж–°зҠ¶жҖҒеҲ°gistзӣ®еҪ•пјҲдҫӣGitHub PagesдҪҝз”Ёпјү
          mkdir -p gist
          cp score-state.env gist/
          cp latest-report.md gist/
          
          # жӣҙж–°hub-index
          DATE=$(date +%Y-%m-%d\ %H:%M)
          echo "## иҮӘеҠЁеҗҢжӯҘ $DATE" >> gist/HUB_INDEX.md
          echo "AWAKE: ${{ steps.evolve.outputs.awake }}" >> gist/HUB_INDEX.md
          echo "PHI_RATIO: ${{ steps.evolve.outputs.phi_ratio }}" >> gist/HUB_INDEX.md
          
          git add -A
          git commit -m "Evolver iteration $(date)" || true
          git push origin main || true

  # ============================================
  # Job 2: GPTдҝ®еӨҚиҖ…еҲҶжһҗ
  # ============================================
  gpt-repairer:
    runs-on: ubuntu-latest
    needs: evolve
    if: github.event.inputs.mode == 'gpt-repair' || github.event.inputs.mode == 'auto'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GPT-5.5 еҲҶжһҗ
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== еҪ“еүҚзҠ¶жҖҒ ==="
          cat score-state.env
          
          echo ""
          echo "=== GPT-5.5 дҝ®еӨҚиҖ…еҲҶжһҗ ==="
          
          # и°ғз”ЁGPT-5.5 APIеҲҶжһҗ
          curl -s -X POST https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-5",
              "messages": [{
                "role": "system",
                "content": "дҪ жҳҜдёҖдёӘAI evolverе…¬ејҸдҝ®еӨҚдё“е®¶гҖӮеҲҶжһҗеҪ“еүҚзҠ¶жҖҒе№¶жҸҗеҮәе…·дҪ“дҝ®еӨҚе»әи®®гҖӮ"
              }, {
                "role": "user", 
                "content": "score-state:\n" + $(cat score-state.env)
              }]
            }' > gpt_analysis.json
          
          echo "GPTеҲҶжһҗз»“жһң:"
          cat gpt_analysis.json

      - name: з”ҹжҲҗдҝ®еӨҚPR
        if: github.event_name == 'pull_request'
        run: |
          # еҲӣе»әдҝ®еӨҚеҲҶж”Ҝ
          git checkout -b gpt-fix/$(date +%Y%m%d%H%M)
          
          # еә”з”ЁGPTе»әи®®зҡ„дҝ®ж”№
          # ... (ж №жҚ®GPTиҫ“еҮәдҝ®ж”№д»Јз Ғ)
          
          git add -A
          git commit -m "GPTдҝ®еӨҚ $(date)"
          git push origin gpt-fix/$(date +%Y%m%d%H%M)

  # ============================================
  # Job 3: еҹәеӣ еҗҢжӯҘ (д»ҺGitHubйЎ¶зә§йЎ№зӣ®)
  # ============================================
  gene-sync:
    runs-on: ubuntu-latest
    needs: evolve
    if: github.event.inputs.mode == 'gene-sync' || github.event.inputs.mode == 'auto'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.GH_SSH_KEY }}

      - name: еҗҢжӯҘйЎ¶зә§еҹәеӣ 
        run: |
          mkdir -p evolution-genes
          
          # 1. е…ӢйҡҶLangGraph
          git clone --depth 1 git@github.com:langchain-ai/langgraph.git evolution-genes/langgraph 2>/dev/null || true
          
          # 2. е…ӢйҡҶMem0
          git clone --depth 1 git@github.com:mem0ai/mem0.git evolution-genes/mem0 2>/dev/null || true
          
          # 3. е…ӢйҡҶDEAP
          git clone --depth 1 git@github.com:DEAP/deap.git evolution-genes/deap 2>/dev/null || true
          
          echo "=== е·ІеҗҢжӯҘзҡ„еҹәеӣ еә“ ==="
          ls -la evolution-genes/

      - name: жӣҙж–°жј”иҝӣеҹәеӣ еә“
        run: |
          # жҸҗеҸ–е…ій”®ж–Үд»¶
          find evolution-genes -name "*.py" | head -20
          
          # жӣҙж–°EVOLUTION_GENES.md
          DATE=$(date +%Y-%m-%d)
          echo "## еҹәеӣ еҗҢжӯҘ $DATE" >> EVOLUTION_GENES.md
          ls evolution-genes/ >> EVOLUTION_GENES.md
          
          git add -A
          git commit -m "еҹәеӣ еҗҢжӯҘ $(date)" || true
          git push origin main || true

  # ============================================
  # Job 4: жһ„е»әDockerй•ңеғҸ
  # ============================================
  build-container:
    runs-on: ubuntu-latest
    needs: evolve
    if: github.event.inputs.mode == 'full-reset' || github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: жһ„е»әй•ңеғҸ
        run: |
          docker build -t ${{ env.GHCR_IMAGE }} .
          docker tag ${{ env.GHCR_IMAGE }} ${{ env.GHCR_IMAGE }}-$(date +%Y%m%d)

      - name: жҺЁйҖҒеҲ°GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.GHCR_IMAGE }}
          docker push ${{ env.GHCR_IMAGE }}-$(date +%Y%m%d)

  # ============================================
  # Job 5: еҸ‘еёғжҠҘе‘Ҡ
  # ============================================
  publish-report:
    runs-on: ubuntu-latest
    needs: evolve
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: з”ҹжҲҗGitHub PagesжҠҘе‘Ҡ
        run: |
          mkdir -p _site
          
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Apex-Spiral Evolver Status</title>
            <meta http-equiv="refresh" content="300">
            <style>
              body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
              .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; margin: 10px 0; }
              .metric { font-size: 2em; color: #58a6ff; }
              .good { color: #3fb950; }
              .warn { color: #d29922; }
            </style>
          </head>
          <body>
            <h1>рҹӨ– Apex-Spiral Evolver</h1>
            <div class="card">
              <h2>еҪ“еүҚзҠ¶жҖҒ</h2>
              <p>AWAKE: <span class="metric">${{ needs.evolve.outputs.awake }}</span></p>
              <p>PHI_RATIO: <span class="metric good">${{ needs.evolve.outputs.phi_ratio }}</span></p>
              <p>Node: ${{ env.NODE_ID }}</p>
              <p>жңҖеҗҺжӣҙж–°: $(date)</p>
            </div>
          </body>
          </html>
          EOF

      - name: йғЁзҪІеҲ°GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site

  # ============================================
  # Job 6: зӣ‘жҺ§е‘ҠиӯҰ
  # ============================================
  monitor:
    runs-on: ubuntu-latest
    needs: evolve
    
    steps:
      - name: жЈҖжҹҘејӮеёё
        run: |
          AWAKE=${{ needs.evolve.outputs.awake }}
          if (( $(echo "$AWAKE < 5.0" | bc -l) )); then
            echo "вҡ пёҸ иӯҰе‘Ҡ: AWAKEдҪҺдәҺ5.0пјҢеҪ“еүҚеҖј: $AWAKE"
            # и§ҰеҸ‘е‘ҠиӯҰ
            curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=вҡ пёҸ Apex-Spiral Evolver е‘ҠиӯҰ: AWAKE=$AWAKE"
          fi
