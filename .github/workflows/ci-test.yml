name: CI Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test echo
        run: |
          echo "CI Test Running"
          date
          echo "done" > ci_test_marker.txt

      - name: Commit
        run: |
          git config --local user.email "ci-test@node"
          git config --local user.name "CI Test"
          git add ci_test_marker.txt
          git commit -m "CI test $(date)" || echo "nothing to commit"
          git push origin main || echo "push failed"
