name: Apex-Spiral Evolver

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    outputs:
      phi_ratio: ${{ steps.evolve.outputs.phi_ratio }}
      awake: ${{ steps.evolve.outputs.awake }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 运行Evolver
        id: evolve
        env:
          FREEMODEL_API_KEY: ${{ secrets.FREEMODEL_API_KEY }}
        run: |
          chmod +x apex-iterate.sh
          ./apex-iterate.sh || true

          echo "phi_ratio=$(grep PHI_RATIO score-state.env | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "awake=$(grep AWAKE score-state.env | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: 推送结果
        run: |
          git config --local user.email "evolver@node_cfd285ff67c1"
          git config --local user.name "Evolver Bot"
          git add -A
          git commit -m "Evolver $(date)" || true
          git push origin main || echo "推送失败（无changes或凭据不足）"

  gpt-repairer:
    runs-on: ubuntu-latest
    needs: evolve
    if: github.event.inputs.mode == 'gpt-repair'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GPT分析
        if: secrets.FREEMODEL_API_KEY != ''
        env:
          FREEMODEL_API_KEY: ${{ secrets.FREEMODEL_API_KEY }}
        run: |
          echo "=== 状态 ==="
          cat score-state.env

      - name: 推送分析
        run: |
          git config --local user.email "gpt-repairer@node_cfd285ff67c1"
          git config --local user.name "GPT Repairer"
          git add -A
          git commit -m "GPT repairer $(date)" || true
          git push origin main || echo "推送失败"
