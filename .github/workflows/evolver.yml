name: Apex-Spiral Evolver

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    outputs:
      phi_ratio: ${{ fromJSON(steps.evolve.outputs.result).phi_ratio }}
      awake: ${{ fromJSON(steps.evolve.outputs.result).awake }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Go环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 构建Go和Rust二进制
        run: |
          mkdir -p ~/bin

          # 构建Go search_skill
          go build -o ~/bin/search_skill search_skill_core.go
          echo "Go binary built"

          chmod +x ~/bin/search_skill ~/bin/emv_skill 2>/dev/null || true

      - name: 运行Evolver
        id: evolve
        env:
          FREEMODEL_API_KEY: ${{ secrets.FREEMODEL_API_KEY }}
        run: |
          chmod +x apex-iterate.sh
          ./apex-iterate.sh || true

          # 输出JSON格式结果供后续job使用
          PHI=$(grep PHI_RATIO score-state.env | cut -d= -f2)
          AWAKE=$(grep AWAKE score-state.env | cut -d= -f2)
          echo "result={\"phi_ratio\":\"$PHI\",\"awake\":\"$AWAKE\"}" >> $GITHUB_OUTPUT

      - name: 推送结果
        run: |
          git config --local user.email "evolver@node_cfd285ff67c1"
          git config --local user.name "Evolver Bot"
          git add -A
          git commit -m "Evolver $(date)" || true
          git push origin main || echo "推送失败（无changes或凭据不足）"
