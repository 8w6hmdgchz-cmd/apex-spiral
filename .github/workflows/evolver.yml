name: Apex-Spiral Evolver

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    outputs:
      phi_ratio: ${{ steps.evolve.outputs.phi_ratio }}
      awake: ${{ steps.evolve.outputs.awake }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 构建Go和Rust二进制
        run: |
          mkdir -p ~/bin

          # 构建Go search_skill
          go build -o ~/bin/search_skill search_skill_core.go
          echo "Go binary built"

          # 构建Rust emv_skill (如果Cargo可用)
          if command -v cargo &> /dev/null; then
            cargo build --manifest-path emv_skill/Cargo.toml --release
            cp emv_skill/target/release/emv_skill ~/bin/
            echo "Rust binary built"
          else
            echo "Rust not available, skipping emv_skill"
          fi

          chmod +x ~/bin/search_skill ~/bin/emv_skill 2>/dev/null || true

      - name: 运行Evolver
        id: evolve
        env:
          FREEMODEL_API_KEY: ${{ secrets.FREEMODEL_API_KEY }}
        run: |
          chmod +x apex-iterate.sh
          ./apex-iterate.sh || true

          echo "phi_ratio=$(grep PHI_RATIO score-state.env | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "awake=$(grep AWAKE score-state.env | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: 推送结果
        run: |
          git config --local user.email "evolver@node_cfd285ff67c1"
          git config --local user.name "Evolver Bot"
          git add -A
          git commit -m "Evolver $(date)" || true
          git push origin main || echo "推送失败（无changes或凭据不足）"
