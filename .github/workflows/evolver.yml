name: Apex-Spiral Evolver

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Go环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 设置Rust环境
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.75

      - name: 构建Go和Rust二进制
        env:
          APEX_WORKSPACE: ${{ github.workspace }}
        run: |
          mkdir -p ~/bin

          # 构建Go search_skill
          go build -o ~/bin/search_skill search_skill_core.go
          echo "Go binary built"

          # 构建Rust emv_skill
          cargo build --manifest-path emv_skill/Cargo.toml --release
          cp emv_skill/target/release/emv_skill ~/bin/
          echo "Rust binary built"

          chmod +x ~/bin/search_skill ~/bin/emv_skill

      - name: 运行EMV Skill生成
        env:
          FREEMODEL_API_KEY: ${{ secrets.FREEMODEL_API_KEY }}
          APEX_WORKSPACE: ${{ github.workspace }}
        run: |
          # 运行EMV生成新技能基因
          APEX_DOC="迭代状态: PHI_RATIO=1.0 AWAKE=8 BUG=B4"
          EMV_TASK="APEX熵Skill迭代检测"
          ~/bin/emv_skill "$APEX_DOC" "$EMV_TASK" || true

      - name: 运行Evolver
        env:
          FREEMODEL_API_KEY: ${{ secrets.FREEMODEL_API_KEY }}
          APEX_WORKSPACE: ${{ github.workspace }}
        run: |
          chmod +x apex-iterate.sh
          ./apex-iterate.sh || true

          # 确保skillbank被Go binary保存到正确位置
          echo "SkillBank saved to $APEX_WORKSPACE/state/skillbank.json"

      - name: 推送结果
        run: |
          git config --local user.email "evolver@node_cfd285ff67c1"
          git config --local user.name "Evolver Bot"
          git add -A
          git commit -m "Evolver $(date)" || true
          git push origin main || echo "推送失败（无changes）"
