name: Apex-Spiral Evolver

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Go环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 构建Go二进制
        env:
          APEX_WORKSPACE: ${{ github.workspace }}
        run: |
          mkdir -p ~/bin
          go build -o ~/bin/search_skill search_skill_core.go
          chmod +x ~/bin/search_skill
          echo "Go build done"

      - name: 尝试构建Rust EMV（如失败则跳过）
        run: |
          if command -v cargo &> /dev/null; then
            cargo build --manifest-path emv_skill/Cargo.toml --release || true
            cp emv_skill/target/release/emv_skill ~/bin/ 2>/dev/null || true
            echo "Rust build attempted"
          else
            echo "Rust not available, skipping EMV binary"
          fi

      - name: 运行Evolver
        env:
          FREEMODEL_API_KEY: *** secrets.FREEMODEL_API_KEY }}
          APEX_WORKSPACE: ${{ github.workspace }}
        run: |
          chmod +x apex-iterate.sh
          ./apex-iterate.sh || true

      - name: 推送结果
        run: |
          git config --local user.email "evolver@node_cfd285ff67c1"
          git config --local user.name "Evolver Bot"
          git add -A
          git commit -m "Evolver $(date)" || true
          git push origin main || echo "推送失败（无changes）"
