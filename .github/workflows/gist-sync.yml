name: Gist State Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [sync-requested]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载Gist状态文件
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          echo "GIST_ID: $GIST_ID"
          if [ -z "$GIST_ID" ]; then
            echo "GIST_ID not set, skip sync"
            exit 0
          fi
          
          BASE="https://gist.githubusercontent.com/8w6hmdgchz-cmd/${GIST_ID}/raw"
          mkdir -p state
          
          for f in counter.txt score-state.env latest-report.md; do
            curl -sL --max-time 30 "${BASE}/${f}" -o "${f}" || true
          done
          for f in phi_history.jsonl defect_history.jsonl repair_history.jsonl bug_streak.jsonl consistency_log.jsonl lesson_bank.jsonl metacognition_log.jsonl; do
            curl -sL --max-time 30 "${BASE}/${f}" -o "state/${f}" || true
          done
          
          echo "Download complete"

      - name: 运行Evolver
        env:
          FREEMODEL_API_KEY: ${{ secrets.FREEMODEL_API_KEY }}
          APEX_WORKSPACE: ${{ github.workspace }}
        run: |
          chmod +x apex-iterate.sh
          ./apex-iterate.sh || true

      - name: 上传Evolver状态到Gist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          echo "Uploading to Gist..."
          mkdir -p state
          PAYLOAD_FILE="$RUNNER_TEMP/gist_payload.json"
          GIST_PAYLOAD_FILE="$PAYLOAD_FILE" python3 scripts/gist_uploader.py || { echo "WARN: gist_uploader failed, skipping upload"; exit 0; }
          if [ -n "$GIST_ID" ] && [ -s "$PAYLOAD_FILE" ]; then
            echo "PATCH to Gist..."
            HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "@$PAYLOAD_FILE" \
              "https://api.github.com/gists/$GIST_ID")
            echo "HTTP_CODE: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "SUCCESS: Gist updated"
            else
              echo "WARN: HTTP $HTTP_CODE, continuing anyway"
            fi
          else
            echo "SKIP: GIST_ID not set or payload empty"
          fi

      - name: 提交状态变更
        run: |
          git config --local user.email "evolver@apex-spiral"
          git config --local user.name "Evolver Bot"
          git add -A
          git diff --cached --stat
          git commit -m "Evolver $(date '+%Y-%m-%d %H:%M') [skip ci]" || true
          git push origin main || echo "Push failed"
