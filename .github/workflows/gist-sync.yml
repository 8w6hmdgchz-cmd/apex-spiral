name: Gist State Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [sync-requested]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载Gist状态文件
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          echo "GIST_ID: $GIST_ID"
          if [ -z "$GIST_ID" ]; then
            echo "GIST_ID未设置，跳过同步"
            exit 0
          fi
          
          BASE="https://gist.githubusercontent.com/8w6hmdgchz-cmd/${GIST_ID}/raw"
          
          mkdir -p state
          
          curl -sL --max-time 30 "${BASE}/counter.txt" -o counter.txt || true
          curl -sL --max-time 30 "${BASE}/score-state.env" -o score-state.env || true
          curl -sL --max-time 30 "${BASE}/phi_history.jsonl" -o state/phi_history.jsonl || true
          curl -sL --max-time 30 "${BASE}/defect_history.jsonl" -o state/defect_history.jsonl || true
          curl -sL --max-time 30 "${BASE}/repair_history.jsonl" -o state/repair_history.jsonl || true
          curl -sL --max-time 30 "${BASE}/bug_streak.jsonl" -o state/bug_streak.jsonl || true
          curl -sL --max-time 30 "${BASE}/consistency_log.jsonl" -o state/consistency_log.jsonl || true
          curl -sL --max-time 30 "${BASE}/lesson_bank.jsonl" -o state/lesson_bank.jsonl || true
          curl -sL --max-time 30 "${BASE}/metacognition_log.jsonl" -o state/metacognition_log.jsonl || true
          
          echo "文件下载完成"
          ls -la *.txt *.env *.jsonl state/*.jsonl 2>/dev/null || echo "无文件"

      - name: 运行Evolver
        env:
          FREEMODEL_API_KEY: ${{ secrets.FREEMODEL_API_KEY }}
          APEX_WORKSPACE: ${{ github.workspace }}
        run: |
          chmod +x apex-iterate.sh
          ./apex-iterate.sh || true

      - name: 上传Evolver状态到Gist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          set -e
          echo "准备上传状态到Gist..."
          
          # 写入Python脚本到临时文件
          python3 -c "
import os
script_lines = [
    'import json, os, subprocess',
    '',
    'files = {}',
    \"file_list = [\",
    \"    'counter.txt',\",
    \"    'score-state.env',\",
    \"    'latest-report.md',\",
    \"    'state/phi_history.jsonl',\",
    \"    'state/defect_history.jsonl',\",
    \"    'state/repair_history.jsonl',\",
    \"    'state/bug_streak.jsonl',\",
    \"    'state/consistency_log.jsonl',\",
    \"    'state/lesson_bank.jsonl',\",
    \"    'state/metacognition_log.jsonl',\",
    \"]\",
    'for f in file_list:',
    '    if os.path.isfile(f):',
    '        try:',
    '            with open(f) as fh:',
    \"                files[os.path.basename(f)] = {'content': fh.read()}\",
    '        except:',
    '            pass',
    \"desc = 'APEX Evolver State ' + subprocess.check_output(['date']).decode().strip()\",
    \"result = {'description': desc, 'public': False, 'files': files}\",
    \"outpath = os.environ.get('GITHUB_ENV', '/tmp/gist_payload.json')\",
    'with open(outpath, \"w\") as fh:',
    '    json.dump(result, fh)',
    \"print('Prepared ' + str(len(files)) + ' files -> ' + outpath)\",
]
os.makedirs('/tmp', exist_ok=True)
with open('/tmp/gist_uploader.py', 'w') as f:
    f.write('\\n'.join(script_lines))
"
          
          # 执行脚本
          python3 /tmp/gist_uploader.py
          
          # 上传到Gist
          if [ -n "$GIST_ID" ] && [ -f "$GITHUB_ENV" ]; then
            echo "上传到Gist..."
            RESP=$(curl -sL -w '
HTTP:%{http_code}' -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "@$GITHUB_ENV" \
              "https://api.github.com/gists/$GIST_ID")
            HTTP_CODE=$(echo "$RESP" | grep HTTP: | cut -d: -f2)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Gist状态已更新"
            else
              echo "❌ HTTP $HTTP_CODE"
            fi
          else
            echo "跳过Gist上传（GIST_ID未设置）"
          fi

      - name: 提交状态变更
        run: |
          git config --local user.email "evolver@apex-spiral"
          git config --local user.name "Evolver Bot"
          git add -A
          git diff --cached --stat
          git commit -m "Evolver $(date '+%Y-%m-%d %H:%M') [skip ci]" || true
          git push origin main || echo "Push失败（无changes或无权限）"
