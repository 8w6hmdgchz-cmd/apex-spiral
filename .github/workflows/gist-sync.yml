name: Gist State Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [sync-requested]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载Gist状态文件
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          echo "GIST_ID: $GIST_ID"
          if [ -z "$GIST_ID" ]; then
            echo "GIST_ID未设置，跳过同步"
            exit 0
          fi
          
          # 从Gist CDN读取各状态文件
          BASE="https://gist.githubusercontent.com/8w6hmdgchz-cmd/${GIST_ID}/raw"
          
          mkdir -p state
          
          curl -sL --max-time 30 "${BASE}/counter.txt" -o counter.txt || true
          curl -sL --max-time 30 "${BASE}/score-state.env" -o score-state.env || true
          curl -sL --max-time 30 "${BASE}/phi_history.jsonl" -o state/phi_history.jsonl || true
          curl -sL --max-time 30 "${BASE}/defect_history.jsonl" -o state/defect_history.jsonl || true
          curl -sL --max-time 30 "${BASE}/repair_history.jsonl" -o state/repair_history.jsonl || true
          curl -sL --max-time 30 "${BASE}/bug_streak.jsonl" -o state/bug_streak.jsonl || true
          curl -sL --max-time 30 "${BASE}/consistency_log.jsonl" -o state/consistency_log.jsonl || true
          curl -sL --max-time 30 "${BASE}/lesson_bank.jsonl" -o state/lesson_bank.jsonl || true
          curl -sL --max-time 30 "${BASE}/metacognition_log.jsonl" -o state/metacognition_log.jsonl || true
          
          echo "文件下载完成"
          ls -la *.txt *.env *.jsonl state/*.jsonl 2>/dev/null || echo "无文件"

      - name: 运行Evolver
        env:
          FREEMODEL_API_KEY: ${{ secrets.FREEMODEL_API_KEY }}
          APEX_WORKSPACE: ${{ github.workspace }}
        run: |
          chmod +x apex-iterate.sh
          ./apex-iterate.sh || true

      - name: 上传Evolver状态到Gist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          echo "准备上传状态到Gist..."
          
          # 准备要上传的文件列表
          FILES_TO_UPLOAD="counter.txt score-state.env latest-report.md "
          FILES_TO_UPLOAD+="state/phi_history.jsonl state/defect_history.jsonl "
          FILES_TO_UPLOAD+="state/repair_history.jsonl state/bug_streak.jsonl "
          FILES_TO_UPLOAD+="state/consistency_log.jsonl state/lesson_bank.jsonl "
          FILES_TO_UPLOAD+="state/metacognition_log.jsonl"
          
          # 构建Python dict
          python3 << PYEOF
import json
import os
import sys

files = {}
for f in os.environ.get('FILES_TO_UPLOAD', '').split():
    if os.path.isfile(f):
        try:
            with open(f, 'r') as fh:
                content = fh.read()
            fname = os.path.basename(f)
            files[fname] = {"content": content}
        except Exception as e:
            print(f"跳过 {f}: {e}", file=sys.stderr)

result = {
    "description": "APEX Evolver State $(date '+%Y-%m-%d %H:%M')",
    "public": False,
    "files": files
}
with open(os.environ.get('GITHUB_ENV', '/tmp/gist_payload.json'), 'w') as f:
    json.dump(result, f)
print(f"Prepared {len(files)} files for upload")
PYEOF
          
          echo "Payload文件已生成"
          
          if [ -n "$GIST_ID" ] && [ -f "$GITHUB_ENV" ]; then
            RESP=$(curl -sL -w '\nHTTP:%{http_code}' -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "@$GITHUB_ENV" \
              "https://api.github.com/gists/$GIST_ID")
            HTTP_CODE=$(echo "$RESP" | grep HTTP: | cut -d: -f2)
            BODY=$(echo "$RESP" | sed '/HTTP:/d')
            echo "Gist更新结果: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Gist状态已更新"
            else
              echo "❌ $BODY" | head -3
            fi
          else
            echo "GIST_ID未设置或payload文件不存在，跳过Gist上传"
          fi

      - name: 提交状态变更
        run: |
          git config --local user.email "evolver@apex-spiral"
          git config --local user.name "Evolver Bot"
          git add -A
          git diff --cached --stat
          git commit -m "Evolver $(date '+%Y-%m-%d %H:%M') [skip ci]" || true
          git push origin main || echo "Push失败（无changes或无权限）"
